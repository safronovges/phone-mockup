<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="theme-color" content="#0f1923"/>
<title>IOA · Equipment Agent</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f4f5f7;--card:#fff;--border:#e2e8f0;
  --text:#0f172a;--text-2:#64748b;--text-3:#94a3b8;
  --blue:#3b82f6;--blue-dark:#2563eb;--blue-light:#eff6ff;
  --green:#10b981;--red:#ef4444;--amber:#f59e0b;--purple:#8b5cf6;--teal:#14b8a6;
  --navy:#0f1923;
  --shadow:0 1px 4px rgba(0,0,0,.08);
  --shadow-md:0 4px 16px rgba(0,0,0,.10);
  --r:12px;--r-sm:8px;
  --tab-h:64px;--header-h:56px;--status-h:28px;
}
html,body{height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;font-size:15px;background:var(--bg);color:var(--text)}
#root{height:100%;display:flex;flex-direction:column;overflow:hidden}

/* ── HEADER ── */
.m-header{
  height:var(--header-h);background:var(--navy);
  display:flex;align-items:center;padding:0 16px;gap:10px;
  flex-shrink:0;position:relative;z-index:40;
}
.m-header-logo{font-size:13px;font-weight:800;color:#fff;letter-spacing:.04em;flex:1}
.m-header-logo span{color:#60a5fa}
.m-scope-pill{
  display:flex;background:rgba(255,255,255,.08);border-radius:20px;padding:3px;gap:2px;
}
.m-scope-btn{
  padding:4px 10px;border-radius:16px;border:none;background:transparent;
  font-size:11px;font-weight:600;color:rgba(255,255,255,.5);cursor:pointer;font-family:inherit;
  transition:all .15s;white-space:nowrap;
}
.m-scope-btn.active{background:var(--blue);color:#fff}
.m-notif-btn{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.08);border:none;
  display:flex;align-items:center;justify-content:center;cursor:pointer;color:#94a3b8;flex-shrink:0}

/* ── SEARCH BAR ── */
.m-search-wrap{padding:10px 16px 6px;background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0}
.m-search{
  display:flex;align-items:center;gap:8px;background:#f1f5f9;
  border-radius:10px;padding:9px 12px;
}
.m-search input{border:none;background:transparent;font-size:14px;outline:none;
  flex:1;color:var(--text);font-family:inherit}
.m-search input::placeholder{color:var(--text-3)}

/* ── SCROLL AREA ── */
.m-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:8px}

/* ── BOTTOM TAB BAR ── */
.m-tabs{
  height:var(--tab-h);background:var(--card);border-top:1px solid var(--border);
  display:flex;flex-shrink:0;z-index:50;
  padding-bottom:env(safe-area-inset-bottom,0);
}
.m-tab{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;cursor:pointer;border:none;background:transparent;font-family:inherit;
  color:var(--text-3);transition:color .15s;padding:8px 0;
}
.m-tab.active{color:var(--blue)}
.m-tab svg{transition:transform .15s}
.m-tab.active svg{transform:scale(1.1)}
.m-tab-label{font-size:10px;font-weight:600;letter-spacing:.02em}

/* ── STATUS BAR ── */
.m-status{
  height:var(--status-h);background:var(--navy);display:flex;align-items:center;
  padding:0 16px;gap:12px;flex-shrink:0;overflow:hidden;
}
.m-status-item{font-size:10px;color:#475569;font-family:'DM Mono',monospace;white-space:nowrap}
.m-status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);
  display:inline-block;margin-right:5px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── CARDS ── */
.m-card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
.m-section{padding:16px}
.m-section-title{font-size:12px;font-weight:700;color:var(--text-2);text-transform:uppercase;
  letter-spacing:.06em;margin-bottom:12px}

/* ── KPI GRID ── */
.m-kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px 16px}
.m-kpi{background:var(--card);border-radius:var(--r);padding:14px;box-shadow:var(--shadow)}
.m-kpi-label{font-size:10px;font-weight:700;color:var(--text-2);text-transform:uppercase;
  letter-spacing:.05em;margin-bottom:6px;line-height:1.3}
.m-kpi-value{font-size:22px;font-weight:800;color:var(--text);line-height:1}
.m-kpi-change{font-size:10px;color:var(--green);margin-top:4px;font-weight:500}

/* ── OPP CARD ── */
.opp-card{
  background:var(--card);margin:0 16px 10px;border-radius:var(--r);
  box-shadow:var(--shadow);overflow:hidden;cursor:pointer;
  transition:box-shadow .15s, transform .1s;
  border:1.5px solid transparent;
}
.opp-card:active{transform:scale(.985);box-shadow:var(--shadow-md)}
.opp-card.selected{border-color:var(--blue)}
.opp-card-top{padding:14px 14px 10px;border-bottom:1px solid #f8fafc}
.opp-card-title{font-size:13px;font-weight:700;line-height:1.4;margin-bottom:6px;color:var(--text)}
.opp-card-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.opp-card-bottom{padding:10px 14px;display:flex;justify-content:space-between;align-items:center;background:#fafafa}
.opp-value{font-size:14px;font-weight:800;color:var(--text)}
.opp-score{font-size:12px;font-weight:700}
.opp-equip{font-size:11px;color:var(--text-2);font-weight:500}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:100px;
  font-size:10px;font-weight:700;letter-spacing:.02em;white-space:nowrap}
.b-blue{background:#dbeafe;color:#1d4ed8}
.b-green{background:#d1fae5;color:#065f46}
.b-red{background:#fee2e2;color:#991b1b}
.b-amber{background:#fef3c7;color:#92400e}
.b-purple{background:#ede9fe;color:#5b21b6}
.b-teal{background:#ccfbf1;color:#134e4a}
.b-gray{background:#f1f5f9;color:#475569}
.b-orange{background:#ffedd5;color:#9a3412}

/* ── BOTTOM SHEET (detail) ── */
.sheet-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;
  display:flex;flex-direction:column;justify-content:flex-end;
  animation:fadeIn .2s ease;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.bottom-sheet{
  background:var(--card);border-radius:20px 20px 0 0;max-height:90vh;
  display:flex;flex-direction:column;animation:slideUp .25s cubic-bezier(.4,0,.2,1);
  padding-bottom:env(safe-area-inset-bottom,0);
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:36px;height:4px;background:#e2e8f0;border-radius:10px;margin:12px auto 0}
.sheet-header{padding:16px 20px 12px;border-bottom:1px solid var(--border)}
.sheet-title{font-size:15px;font-weight:800;line-height:1.4;margin-bottom:8px}
.sheet-scroll{overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1}
.sheet-body{padding:16px 20px}
.sheet-row{display:flex;justify-content:space-between;align-items:flex-start;
  padding:9px 0;border-bottom:1px solid #f8fafc}
.sheet-label{font-size:12px;color:var(--text-2);flex-shrink:0;padding-right:12px}
.sheet-val{font-size:12px;font-weight:600;color:var(--text);text-align:right}
.sheet-actions{padding:12px 20px 20px;display:flex;gap:8px;flex-wrap:wrap;
  border-top:1px solid var(--border)}

/* ── SOURCE CARD ── */
.src-card{background:var(--card);margin:0 16px 10px;border-radius:var(--r);
  box-shadow:var(--shadow);padding:14px;cursor:pointer;transition:box-shadow .15s}
.src-card:active{box-shadow:var(--shadow-md)}
.src-name{font-size:13px;font-weight:700;margin-bottom:4px}
.src-url{font-size:11px;color:var(--text-3);margin-bottom:10px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.src-metrics{display:flex;gap:12px}
.src-metric{font-size:11px;color:var(--text-2)}
.src-metric strong{color:var(--text);font-weight:700}

/* ── STATUS DOT ── */
.sdot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px;flex-shrink:0}
.s-healthy{background:var(--green)}.s-degraded{background:var(--amber)}.s-down{background:var(--red)}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:11px 18px;border-radius:10px;border:none;font-size:13px;font-weight:700;
  cursor:pointer;font-family:inherit;transition:all .15s;letter-spacing:.01em}
.btn:active{transform:scale(.96)}
.btn-primary{background:var(--blue);color:#fff}
.btn-secondary{background:#f1f5f9;color:var(--text)}
.btn-sm{padding:7px 12px;font-size:12px;border-radius:8px}
.btn-full{width:100%}
.btn-danger{background:#fef2f2;color:var(--red)}

/* ── FILTERS SCROLL ROW ── */
.filter-row{display:flex;gap:8px;overflow-x:auto;padding:10px 16px;
  -webkit-overflow-scrolling:touch;flex-shrink:0}
.filter-row::-webkit-scrollbar{display:none}
.filter-chip{
  flex-shrink:0;padding:6px 12px;border-radius:20px;border:1.5px solid var(--border);
  background:var(--card);font-size:12px;font-weight:600;color:var(--text-2);
  cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap;
}
.filter-chip.active{background:var(--blue-light);border-color:var(--blue);color:var(--blue)}

/* ── SECTION HEADER ROW ── */
.section-head{display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px 6px}
.section-head-title{font-size:13px;font-weight:700;color:var(--text)}
.section-head-count{font-size:11px;color:var(--text-3);font-weight:500}

/* ── DIGEST CARD ── */
.dig-card{background:var(--card);margin:0 16px 10px;border-radius:var(--r);
  box-shadow:var(--shadow);padding:16px;cursor:pointer}
.dig-rank{font-size:28px;font-weight:900;color:#e2e8f0;line-height:1;margin-bottom:6px}
.dig-title{font-size:13px;font-weight:700;line-height:1.4;margin-bottom:8px}
.dig-why{font-size:12px;color:var(--text-2);line-height:1.6;margin-bottom:8px}
.dig-partner{font-size:11px;background:var(--blue-light);color:var(--blue-dark);
  padding:4px 10px;border-radius:20px;display:inline-block;font-weight:700}
.dig-score{font-size:22px;font-weight:900;line-height:1}

/* ── ALERT CARD ── */
.alert-card{background:var(--card);margin:0 16px 10px;border-radius:var(--r);
  box-shadow:var(--shadow);padding:14px}
.alert-rule{background:#f8fafc;border-radius:8px;padding:10px 12px;
  font-family:'DM Mono',monospace;font-size:11px;line-height:1.8;
  margin-bottom:10px;border-left:3px solid var(--blue)}
.rule-kw{color:var(--blue);font-weight:700}
.rule-op{color:var(--green)}

/* ── EMPTY STATE ── */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:60px 30px;gap:12px;color:var(--text-3);text-align:center}
.empty-state svg{opacity:.25}
.empty-state p{font-size:13px;line-height:1.6}

/* ── DISCLAIMER OVERLAY ── */
.disc-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;
  display:flex;align-items:flex-end;backdrop-filter:blur(4px);padding-bottom:env(safe-area-inset-bottom,0)}
.disc-sheet{background:#fff;border-radius:24px 24px 0 0;padding:24px 20px 32px;width:100%}
.disc-bar{width:36px;height:4px;background:#e2e8f0;border-radius:10px;margin:0 auto 20px}
.disc-icon{width:48px;height:48px;border-radius:14px;background:#eff6ff;
  display:flex;align-items:center;justify-content:center;margin-bottom:16px}
.disc-title{font-size:18px;font-weight:800;margin-bottom:10px}
.disc-body{font-size:13px;color:#334155;line-height:1.7;margin-bottom:12px}
.disc-note{background:#f8fafc;border-radius:10px;padding:12px;
  font-size:12px;color:#475569;line-height:1.6;margin-bottom:20px}

/* ── TOAST ── */
.toast-wrap{position:fixed;bottom:calc(var(--tab-h) + 12px);left:50%;
  transform:translateX(-50%);z-index:500;display:flex;flex-direction:column;
  gap:8px;width:calc(100% - 32px);max-width:380px;pointer-events:none}
.m-toast{background:#1e293b;color:#f1f5f9;padding:12px 16px;border-radius:12px;
  font-size:13px;font-weight:500;box-shadow:var(--shadow-md);
  display:flex;align-items:center;gap:8px;pointer-events:auto;
  animation:toastIn .2s ease}
.m-toast.success{border-left:3px solid var(--green)}
.m-toast.error{border-left:3px solid var(--red)}
.m-toast.info{border-left:3px solid var(--blue)}
@keyframes toastIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

/* ── WEEKLY DIGEST ── */
.bar-row{margin-bottom:14px}
.bar-label{display:flex;justify-content:space-between;margin-bottom:4px;font-size:12px}
.bar-label span:first-child{font-weight:600}
.bar-label span:last-child{color:var(--text-2)}
.bar-track{height:8px;background:#f1f5f9;border-radius:10px;overflow:hidden}
.bar-fill{height:100%;border-radius:10px}

/* ── PULL TO REFRESH HINT ── */
.ptr-hint{text-align:center;font-size:11px;color:var(--text-3);padding:8px;font-weight:500}
</style>
</head>

function assignPartner(equipment){
  // Find partners whose fit list includes this equipment type
  const fits = PARTNERS.filter(p =>
    PARTNER_EQUIPMENT_FIT[p].some(e => equipment && equipment.toLowerCase().includes(e.split(" ")[0].toLowerCase()))
  );
  if(fits.length > 0) return fits[Math.floor(Math.random()*fits.length)];
  return PARTNERS[Math.floor(Math.random()*PARTNERS.length)];
}

// We use the seeded rng so it's deterministic
function pickContact(region){
  const pool = region==="Africa"?CONTACT_NAMES_AFRICA:region==="Europe"?CONTACT_NAMES_EUROPE:CONTACT_NAMES_ASIA;
  // ~25% chance email not found, ~30% chance phone not found (independently)

  const emailFound  = seededN(0,3) > 0; // 75% found
  const phoneFound  = seededN(0,2) > 0; // 67% found
  return {
    contactName:  contact[0],
    contactEmail: emailFound  ? contact[1] : "Not found",
    contactPhone: phoneFound  ? contact[2] : "Not found",
  };
}

const ToastCtx = React.createContext(null);
function ToastProvider({children}){
  const [toasts,setToasts] = useState([]);
  const add = useCallback((msg,type="info")=>{
    const id = Date.now();
    setToasts(t=>[...t,{id,msg,type}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3200);
  },[]);
  return(
    <ToastCtx.Provider value={add}>
      {children}
      <div className="toast-wrap">
        {toasts.map(t=>(
          <div key={t.id} className={`m-toast ${t.type}`}>
            {t.type==="success"?"✓":t.type==="error"?"✗":"ℹ"} {t.msg}
          </div>
        ))}
      </div>
    </ToastCtx.Provider>
  );
}
const useToast = ()=>React.useContext(ToastCtx);

      toast(`Test crawl: ${ok?"Healthy ✓":"Degraded — check logs"}`,ok?"success":"error");
      setTesting(false);
    },1200);
  };
  return(
    <div className="sheet-overlay" onClick={onClose}>
      <div className="bottom-sheet" onClick={e=>e.stopPropagation()}>
        <div className="sheet-handle"/>
        <div className="sheet-header">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginTop:8}}>
            <div style={{flex:1,paddingRight:12}}>
              <div className="sheet-title" style={{fontSize:14}}>{st.name}</div>
              <div style={{fontSize:11,color:"var(--text-3)",marginTop:2,wordBreak:"break-all"}}>{st.url}</div>
              <div style={{display:"flex",alignItems:"center",gap:6,marginTop:6}}>
                <StatusDot s={st.status}/>
                <span style={{fontSize:12,fontWeight:600}}>{st.status}</span>
                <span className="badge b-gray" style={{marginLeft:4}}>{st.type}</span>
              </div>
            </div>
            <button onClick={onClose} style={{background:"#f1f5f9",border:"none",borderRadius:8,width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0}}>
              <IC name="x" size={16} color="#64748b"/>
            </button>
          </div>
        </div>
        <div className="sheet-scroll">
          <div className="sheet-body">
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
              {[["Latency",`${st.latency}ms`],["Error Rate",`${st.errorRate}%`],["Items (7d)",st.items7d],["Last Check",st.lastChecked]].map(([l,v])=>(
                <div key={l} style={{background:"#f8fafc",borderRadius:8,padding:10}}>
                  <div style={{fontSize:10,color:"var(--text-2)",fontWeight:600,textTransform:"uppercase",marginBottom:4}}>{l}</div>
                  <div style={{fontSize:16,fontWeight:800,color:l==="Error Rate"&&st.errorRate>10?"var(--red)":"var(--text)"}}>{v}</div>
                </div>
              ))}
            </div>
            {[["Robots Blocked",st.robotsBlocked?"Yes":"No",st.robotsBlocked?"var(--red)":"var(--green)"],
              ["Requires JS",st.requiresJs?"Yes":"No",st.requiresJs?"var(--amber)":"var(--green)"],
              ["Region",st.region,"var(--text)"],
            ].map(([l,v,col])=>(
              <div className="sheet-row" key={l}>
                <span className="sheet-label">{l}</span>
                <span className="sheet-val" style={{color:col}}>{v}</span>
              </div>
            ))}
            {st.status!=="Healthy"&&(
              <div style={{background:"#fef2f2",border:"1px solid #fecaca",borderRadius:8,padding:10,marginTop:12,fontSize:11,color:"#991b1b",fontFamily:"'DM Mono',monospace"}}>
                {st.status==="Down"?"403 Forbidden — credentials expired":"Timeout — HTML structure changed"}
              </div>
            )}
          </div>
        </div>
        <div className="sheet-actions">
          <button className="btn btn-primary" style={{flex:2}} onClick={runTest} disabled={testing}>
            {testing?"Crawling…":"Run Test Crawl"}
          </button>
          <button className="btn btn-danger" style={{flex:1}} onClick={()=>toast("Source disabled","error")}>Disable</button>
        </div>
      </div>
    </div>
  );
}

// ── PAGE: WEEKLY DIGEST ───────────────────────────────────────────────────────
function PageWeekly({scope}){
  const toast = useToast();
  const data = useMemo(()=>{
    const d = scope==="All"?OPPORTUNITIES:OPPORTUNITIES.filter(o=>o.region===scope);
    return d.sort((a,b)=>b.matchScore-a.matchScore).slice(0,10);
  },[scope]);

  const stats = useMemo(()=>{
    const d = scope==="All"?OPPORTUNITIES:OPPORTUNITIES.filter(o=>o.region===scope);
    const bySector={},byPartner={};
    d.forEach(o=>{
      bySector[o.sector]=(bySector[o.sector]||0)+1;
      if(o.matchingPartner) byPartner[o.matchingPartner]=(byPartner[o.matchingPartner]||0)+1;
    });
    return{
      total:d.length,
      high:d.filter(o=>o.confidence==="High").length,
      value:d.reduce((a,o)=>a+o.value,0),
      sectors:Object.entries(bySector).sort((a,b)=>b[1]-a[1]).slice(0,5),
      partners:Object.entries(byPartner).sort((a,b)=>b[1]-a[1]).slice(0,5),
    };
  },[scope]);

  const [selected,setSelected] = useState(null);

  return(
    <>
      <div style={{padding:"16px 16px 4px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{fontSize:16,fontWeight:800}}>Weekly Digest</div>
          <div style={{fontSize:12,color:"var(--text-2)"}}>24 Feb – 2 Mar 2026 · {scope}</div>

        <button className="btn btn-sm btn-secondary" onClick={()=>toast("PDF started","info")}>
          <IC name="download" size={13}/>PDF
        </button>
      </div>

      {/* KPI strip */}
      <div className="m-kpi-grid" style={{gridTemplateColumns:"1fr 1fr 1fr"}}>
        <div className="m-kpi">
          <div className="m-kpi-label">Leads (7d)</div>
          <div className="m-kpi-value">{stats.total}</div>
          <div className="m-kpi-change">↑ +{Math.round(stats.total*.18)}</div>
        </div>
        <div className="m-kpi">
          <div className="m-kpi-label">High Conf.</div>
          <div className="m-kpi-value">{stats.high}</div>
          <div className="m-kpi-change">{Math.round(stats.high/stats.total*100)}%</div>
        </div>
        <div className="m-kpi">
          <div className="m-kpi-label">Pipeline</div>
          <div className="m-kpi-value">€{(stats.value/1000).toFixed(0)}B</div>
        </div>
      </div>

      {/* Sectors */}
      <div style={{margin:"0 16px 12px"}}>
        <div className="m-card" style={{padding:16}}>
          <div className="m-section-title">Leads by Sector</div>
          {stats.sectors.map(([sector,count],i)=>{
            const pct = Math.round(count/stats.total*100);
            const colors = ["var(--blue)","var(--teal)","var(--purple)","var(--amber)","var(--green)"];
            return(
              <div className="bar-row" key={sector}>
                <div className="bar-label">
                  <span>{sector}</span><span>{count} · {pct}%</span>
                </div>
                <div className="bar-track">
                  <div className="bar-fill" style={{width:`${pct}%`,background:colors[i]}}/>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Partners */}
      <div style={{margin:"0 16px 12px"}}>
        <div className="m-card" style={{padding:16}}>
          <div className="m-section-title">Partner Match Distribution</div>
          {stats.partners.map(([partner,count],i)=>(
            <div key={partner} style={{display:"flex",alignItems:"center",gap:10,paddingBottom:10,borderBottom:"1px solid #f1f5f9",marginBottom:10}}>

            </div>
          ))}
        </div>
      </div>

      {/* Top 10 */}
      <div className="section-head">
        <span className="section-head-title">Top 10 Leads</span>
        <span className="section-head-count">This week</span>
      </div>
      {data.map((o,i)=>(
        <div key={o.id} className="opp-card" onClick={()=>setSelected(o)}>
          <div className="opp-card-top">
            <div style={{display:"flex",gap:8,alignItems:"flex-start"}}>

        </div>
        <button className="btn btn-primary btn-full" onClick={onClose}>
          <IC name="check" size={16}/>I understand — Show me the concept
        </button>
      </div>
    </div>
  );
}

// ── HEADER ────────────────────────────────────────────────────────────────────
const SCOPE_OPTS = ["Africa","Europe","Asia","All"];

function MHeader({scope,onScope,notifCount=3}){
  return(
    <div className="m-header">
      <div className="m-header-logo">IOA <span>Equipment</span></div>
      <div className="m-scope-pill">
        {SCOPE_OPTS.map(s=>(
          <button key={s} className={`m-scope-btn${scope===s?" active":""}`} onClick={()=>onScope(s)}>
            {s==="All"?"All":s}
          </button>
        ))}
      </div>
      <button className="m-notif-btn" style={{position:"relative"}}>
        <IC name="bell" size={16} color="#94a3b8"/>
        {notifCount>0&&<span style={{position:"absolute",top:4,right:4,width:8,height:8,borderRadius:"50%",background:"var(--red)",border:"2px solid var(--navy)"}}/>}
      </button>
    </div>
  );
}

// ── TAB BAR ───────────────────────────────────────────────────────────────────
const TABS = [
  {id:"dashboard",label:"Feed",icon:"home"},
  {id:"sources",label:"Sources",icon:"globe"},
  {id:"digest",label:"Daily",icon:"digest"},
  {id:"weekly",label:"Weekly",icon:"list"},
  {id:"alerts",label:"Alerts",icon:"alerts"},
];

function TabBar({active,onTab}){
  return(
    <div className="m-tabs">
      {TABS.map(t=>(
        <button key={t.id} className={`m-tab${active===t.id?" active":""}`} onClick={()=>onTab(t.id)}>
          <IC name={t.icon} size={20} color={active===t.id?"var(--blue)":"var(--text-3)"}/>
          <span className="m-tab-label">{t.label}</span>
        </button>
      ))}
    </div>
  );
}

// ── STATUS BAR ────────────────────────────────────────────────────────────────
function MStatus(){
  const [time,setTime] = useState(new Date());
  useEffect(()=>{const t=setInterval(()=>setTime(new Date()),60000);return()=>clearInterval(t)},[]);
  const fmt = d=>d.toTimeString().slice(0,5);
  const next = new Date(time.getTime()+8*60000);
  return(
    <div className="m-status">
      <span className="m-status-item"><span className="m-status-dot"/>Active</span>
      <span className="m-status-item">Dedupe: 98%</span>
      <span className="m-status-item">Last: {fmt(time)}</span>
      <span className="m-status-item">Next: {fmt(next)}</span>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App(){
  const [tab,setTab] = useState("dashboard");
  const [scope,setScope] = useState(()=>localStorage.getItem("ioa-mobile-scope")||"Africa");
  const [search,setSearch] = useState("");
  const [disclaimer,setDisclaimer] = useState(()=>!sessionStorage.getItem("ioa-mob-disc"));

  useEffect(()=>localStorage.setItem("ioa-mobile-scope",scope),[scope]);

  const showSearch = tab==="dashboard"||tab==="sources";

  const pageTitle = {
    dashboard:"Equipment Feed",sources:"Sources",
    digest:"Daily Digest",weekly:"Weekly Digest",alerts:"Alerts"
  }[tab];

  const renderPage = ()=>{
    switch(tab){
      case "dashboard": return <PageDashboard scope={scope} search={search}/>;
      case "sources":   return <PageSources   scope={scope} search={search}/>;
      case "digest":    return <PageDigest    scope={scope}/>;
      case "weekly":    return <PageWeekly    scope={scope}/>;
      case "alerts":    return <PageAlerts/>;
      default:          return null;
    }
  };

  return(
    <ToastProvider>
      {disclaimer&&<Disclaimer onClose={()=>{setDisclaimer(false);sessionStorage.setItem("ioa-mob-disc","1")}}/>}
      <MHeader scope={scope} onScope={s=>{setScope(s);setSearch("")}}/>
      {showSearch&&(
        <div className="m-search-wrap">
          <div className="m-search">
            <IC name="search" size={15} color="#94a3b8"/>
            <input
              placeholder={tab==="dashboard"?"Search opportunities…":"Search sources…"}
              value={search}
              onChange={e=>setSearch(e.target.value)}
            />
            {search&&<button onClick={()=>setSearch("")} style={{background:"none",border:"none",cursor:"pointer",color:"var(--text-3)",padding:0,display:"flex"}}>
              <IC name="x" size={14}/>
            </button>}
          </div>
        </div>
      )}
      <div className="m-scroll">
        <div className="ptr-hint">Pull down to refresh</div>
        {renderPage()}
        <div style={{height:16}}/>
      </div>
      <MStatus/>
      <TabBar active={tab} onTab={t=>{setTab(t);setSearch("")}}/>
    </ToastProvider>
  );
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
